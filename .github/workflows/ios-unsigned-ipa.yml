name: iOS Unsigned IPA

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-unsigned-ipa:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew list xcodegen >/dev/null 2>&1 || brew install xcodegen

      - name: Build unsigned IPA
        run: bash .github/scripts/build-unsigned-ipa.sh

      - name: Upload unsigned IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: TimeApp-unsigned-ipa
          path: |
            build/export/TimeApp-unsigned.ipa
            build/export/TimeApp-unsigned.ipa.sha256
          if-no-files-found: error
          retention-days: 14

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: TimeApp-build-logs
          path: build/logs
          if-no-files-found: warn
          retention-days: 14
